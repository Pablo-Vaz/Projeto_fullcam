services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=api_cameras
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    container_name: mongo_db
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_broker
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  api:
    build: .
    container_name: fastapi_app
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      - db
      - mongodb
      - rabbitmq
    environment:
      - BANCO_POSTGRES=postgresql+asyncpg://postgres:postgres@db:5432/api_cameras
      - MONGO_URL=mongodb://admin:password@mongodb:27017/?authSource=admin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
    volumes:
      - .:/app
  

  consumer:
    build: .
    container_name: consumer
    command: python3 -m app.services.consumer
    depends_on:
      - rabbitmq
      - mongodb
    environment:
      - MONGO_URL=mongodb://admin:password@mongodb:27017/?authSource=admin
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

volumes:
  postgres_data:
  mongo_data:

